name: Integration Test

on:
  push:
    paths:
      - "viral_usher/**"
      - "tests/test_data/**"
      - "Dockerfile"
      - "pyproject.toml"
      - ".github/workflows/integration-test.yml"
  pull_request:
    paths:
      - "viral_usher/**"
      - "tests/test_data/**"
      - "Dockerfile"
      - "pyproject.toml"
      - ".github/workflows/integration-test.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        test_name: ['no_genbank', 'ehdv_4', 'ehdv_4_viral_usher_trees', 'ehdv_4_extra_fasta', 'ehdv_4_extra_fasta_metadata']
      max-parallel: 5
    steps:
    - uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build the Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        push: false
        load: true
        tags: angiehinrichs/viral_usher:development
        cache-from: type=gha
        cache-to: type=gha,mode=max
        outputs: type=oci,dest=/tmp/viral_usher_apptainer.tar

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install viral_usher
      run: |
        python -m pip install --upgrade pip
        pip install -e .

    - name: Run test script with docker
      run: |
        mkdir -p tests/test_data/output
        bash tests/test_${{ matrix.test_name }}.sh tests/test_data/output
        rm -rf tests/test_data/output

    - name: Install Apptainer
      uses: eWaterCycle/setup-apptainer@v2
      with:
        apptainer-version: 1.5.1

    - name: Run test script with apptainer
      env:
        APPTAINER_CONTAINER: oci-archive:///tmp/viral_usher_apptainer.tar
      run: |
        apptainer --version
        mkdir -p tests/test_data/output
        bash tests/test_${{ matrix.test_name }}.sh tests/test_data/output
        rm -rf tests/test_data/output
